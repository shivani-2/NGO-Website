  <section id="title">

      <!-- Nav Bar -->

      <!-- Login -->

      <section id="login">
        <h2 class="h3-foot"><strong>Login.</strong></h2>
        <div class="form-login">

          <form method="post" action="">
            <p>
              <font color="#00334e">Email adress:-</font>
            </p>
            <input name="email_id" type="email" title="Please enter valid ves id" required placeholder="xyz@ves.ac.in"><br>
            <p>
              <font color="#00334e">Password :-</font>
            </p>
            <input name="password" type="password" encrypt="sha1" required placeholder="Your_googlePass123"><br><br>
            <input type="submit" value="Submit" style="height: 25px; width: 100px; left: 10px; top: 10px;">
            <span></span>
          </form>

        </div>
      </section>
